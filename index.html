<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Trends Analysis Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1923;--navy2:#1a2635;--navy3:#243144;
  --accent:#3b9eff;--accent2:#00d4a0;--accent3:#ff6b4a;
  --text:#e8edf3;--text2:#8a9bb0;--text3:#4a5a6e;
  --card:#1e2d3d;--card2:#243347;
  --border:rgba(255,255,255,0.07);
  --font-display:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
}
body{font-family:var(--font-body);background:var(--navy);color:var(--text);font-size:14px;min-height:100vh}

.shell{display:flex;min-height:100vh;background:var(--navy)}

/* Sidebar */
.sidebar{width:200px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh}
.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo h1{font-family:var(--font-display);font-size:14px;color:var(--text);line-height:1.2}
.sidebar-logo p{font-size:10px;color:var(--text2);margin-top:2px}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:8px 20px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--text2);font-size:13px;border-left:2px solid transparent;transition:all 0.15s}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:var(--accent);background:rgba(59,158,255,0.08);border-left-color:var(--accent)}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy)}
.page-header h2{font-family:var(--font-display);font-size:20px;color:var(--text)}
.page-header p{font-size:12px;color:var(--text2);margin-top:2px}
.header-badge{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text2)}

/* Page content area */
#page-content{padding:20px 24px;flex:1;overflow-y:auto}

/* Loading state */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text2);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Fade in */
.fade-in{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>Shopping Trends Analysis</h1>
      <p>Dashboard</p>
    </div>
    <span class="nav-label">Menu</span>
    <div class="nav-item active" data-page="home"><i class="ti ti-home-2"></i>Beranda</div>
    <div class="nav-item" data-page="overview"><i class="ti ti-chart-pie"></i>Overview</div>
    <div class="nav-item" data-page="pelanggan"><i class="ti ti-users"></i>Pelanggan</div>
    <div class="nav-item" data-page="produk"><i class="ti ti-shirt"></i>Produk</div>
    <div class="nav-item" data-page="geografis"><i class="ti ti-map-2"></i>Geografis</div>
    <div class="nav-item" data-page="manajemen"><i class="ti ti-database"></i>Manajemen Data</div>
    <div class="sidebar-footer">
      <!-- Data badge dihapus -->
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="page-header">
      <div>
        <h2 id="pageTitle">Beranda</h2>
        <p id="pageDesc">Selamat datang di Shopping Trends Analysis</p>
      </div>
    </div>
    <div id="page-content">
      <div class="loading"><div class="spinner"></div> Memuat halaman...</div>
    </div>
  </div>
</div>

<script>
const pageMeta = {
  home:       { title:'Beranda',            desc:'Selamat datang di Shopping Trends Analysis'       },
  overview:   { title:'Overview',           desc:'Pendapatan per kategori, distribusi musiman, dan metode pembayaran'},
  pelanggan:  { title:'Analisis Pelanggan', desc:'Demografi usia, gender, dan frekuensi pembelian' },
  produk:    { title:'Analisis Produk',    desc:'Produk terlaris, kategori, warna, dan ukuran favorit' },
  geografis: { title:'Geografis & Shipping', desc:'Distribusi transaksi per wilayah & metode pengiriman'},
  manajemen: { title:'Manajemen Data', desc:'Tambah, edit, atau hapus data pelanggan dan transaksi' },
};


// Cache loaded pages so we don't re-fetch
const pageCache = {};
var currentPage = null;

async function goTo(pageId) {
  if (currentPage === pageId) return;
  currentPage = pageId;

  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === pageId);
  });

  // Update header
  const meta = pageMeta[pageId];
  document.getElementById('pageTitle').textContent = meta.title;
  document.getElementById('pageDesc').textContent = meta.desc;

  // Update URL hash (optional, for bookmarking)
  history.replaceState(null, '', '#' + pageId);

  const container = document.getElementById('page-content');

  // Show loading if not cached
  if (!pageCache[pageId]) {
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Memuat halaman...</div>';
  }

  try {
    if (!pageCache[pageId]) {
      const res = await fetch(`Pages/${pageId}.html`);
      if (!res.ok) throw new Error('Gagal memuat halaman');
      pageCache[pageId] = await res.text();
    }

    container.innerHTML = `<div class="fade-in">${pageCache[pageId]}</div>`;

    // Execute any <script> tags inside the loaded HTML
    container.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      oldScript.replaceWith(newScript);
    });

  } catch (err) {
    container.innerHTML = `<div class="loading" style="color:var(--accent3)">
      <i class="ti ti-alert-circle" style="font-size:20px"></i>
      Gagal memuat halaman: ${err.message}
    </div>`;
  }
}

// Nav click listeners
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => goTo(item.dataset.page));
});

// Load initial page from hash or default
const initPage = location.hash.replace('#','') || 'home';
goTo(initPage);

// Expose goTo globally so pages can call it (e.g. quick-card buttons)
window.goTo = goTo;
</script>
</body>
</html>

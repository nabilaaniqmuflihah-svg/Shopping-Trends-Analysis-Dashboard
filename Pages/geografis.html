<style>
*{box-sizing:border-box;margin:0;padding:0}
.geo-page{font-family:'DM Sans',sans-serif;color:#e8edf3;font-size:14px}
.geo-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.geo-card{background:#1e2d3d;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px}
.geo-card .label{font-size:10px;color:#8a9bb0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.geo-card .val{font-size:22px;font-weight:500;color:#e8edf3}
.geo-card .sub{font-size:11px;color:#8a9bb0;margin-top:3px}
.geo-card.accent .val{color:#3b9eff}
.geo-card.green .val{color:#00d4a0}
.geo-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;margin-bottom:16px}
.geo-panel{background:#1e2d3d;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:18px}
.geo-panel h3{font-size:12px;font-weight:500;color:#8a9bb0;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
#us-map-wrap{position:relative;width:100%;background:#152030;border-radius:8px;overflow:hidden}
#us-map-wrap svg{width:100%;height:auto;display:block}
.state-path{cursor:pointer;transition:opacity .15s}
.state-path:hover{opacity:.75}
#map-tooltip{position:absolute;background:rgba(10,20,32,.95);border:1px solid rgba(59,158,255,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:#e8edf3;pointer-events:none;display:none;z-index:10;white-space:nowrap}
#map-tooltip .tt-state{font-size:13px;font-weight:500;margin-bottom:4px}
#map-tooltip .tt-row{display:flex;justify-content:space-between;gap:20px;color:#8a9bb0}
#map-tooltip .tt-row span:last-child{color:#3b9eff;font-weight:500}
.map-legend{display:flex;align-items:center;gap:16px;margin-top:10px;padding:0 4px;flex-wrap:wrap}
.legend-block{display:flex;align-items:center;gap:8px}
.legend-gradient{width:90px;height:10px;border-radius:4px;background:linear-gradient(to right,#152030,#3b9eff)}
.legend-label{font-size:11px;color:#8a9bb0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.right-panel{display:flex;flex-direction:column;gap:12px}
.state-list{display:flex;flex-direction:column;gap:7px}
.state-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;background:#152030;cursor:default}
.state-item:hover{background:#1b2d42}
.state-rank{font-size:11px;color:#4a5a6e;width:20px;text-align:right;flex-shrink:0}
.state-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.state-bar-wrap{width:80px;flex-shrink:0}
.state-bar-bg{height:5px;background:#243144;border-radius:3px;overflow:hidden}
.state-bar-fill{height:100%;background:#3b9eff;border-radius:3px}
.state-count{font-size:12px;color:#8a9bb0;width:28px;text-align:right;flex-shrink:0}
.spend-list{display:flex;flex-direction:column;gap:7px}
.spend-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;background:#152030;cursor:default}
.spend-item:hover{background:#1b2d42}
.spend-rank{font-size:11px;color:#4a5a6e;width:20px;text-align:right;flex-shrink:0}
.spend-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spend-bar-wrap{width:80px;flex-shrink:0}
.spend-bar-bg{height:5px;background:#243144;border-radius:3px;overflow:hidden}
.spend-bar-fill{height:100%;background:#00d4a0;border-radius:3px}
.spend-val{font-size:12px;color:#00d4a0;width:40px;text-align:right;flex-shrink:0}
.ship-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ship-method{display:flex;flex-direction:column;gap:8px}
.ship-row{display:flex;align-items:center;gap:10px}
.ship-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ship-name{font-size:13px;flex:1}
.ship-pct{font-size:12px;color:#8a9bb0;width:36px;text-align:right}
.ship-bar-bg{height:6px;background:#243144;border-radius:3px;overflow:hidden;flex:1}
.ship-bar-fill{height:100%;border-radius:3px}
.heatmap-wrap{overflow-x:auto}
.heatmap-table{width:100%;border-collapse:separate;border-spacing:4px}
.heatmap-table th{font-size:11px;color:#8a9bb0;font-weight:400;padding:4px 8px;text-align:center}
.heatmap-table th.row-head{text-align:left}
.heatmap-table td{border-radius:6px;padding:8px 10px;text-align:center;font-size:12px;font-weight:500;transition:transform .15s}
.heatmap-table td:hover{transform:scale(1.05);z-index:1;position:relative}
.loading-state{text-align:center;padding:40px;color:#8a9bb0}
.loading-spinner{width:40px;height:40px;border:3px solid #1e2d3d;border-top-color:#3b9eff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-message{text-align:center;padding:40px;background:#1e2d3d;border-radius:12px;color:#f87171}
.error-message i{font-size:32px;margin-bottom:12px;display:block}
</style>

<div class="geo-page">
<div id="loading-state" class="loading-state">
    <div class="loading-spinner"></div>
    <p>Memuat data dari Manajemen Data...</p>
</div>

<div id="dashboard-content" style="display:none">
<div class="geo-cards" id="geo-cards"></div>

<div class="geo-grid">
  <div class="geo-panel">
    <h3>Distribusi Transaksi per Negara Bagian</h3>
    <div id="us-map-wrap">
      <div id="map-tooltip">
        <div class="tt-state" id="tt-state"></div>
        <div class="tt-row"><span>Transaksi</span><span id="tt-txn"></span></div>
        <div class="tt-row"><span>Avg Spend</span><span id="tt-avg"></span></div>
        <div class="tt-row"><span>Avg Rating</span><span id="tt-rat"></span></div>
      </div>
      <svg id="us-map" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="map-legend">
      <div class="legend-block"><span class="legend-label">Sedikit</span><div class="legend-gradient"></div><span class="legend-label">Banyak</span></div>
      <div class="legend-block"><div class="legend-dot" style="background:#3b9eff"></div><span class="legend-label">Volume transaksi</span></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="geo-panel"><h3>Top 5 Negara Bagian — Volume Transaksi</h3><div class="state-list" id="state-list"></div></div>
    <div class="geo-panel"><h3>Top 5 Negara Bagian — Rata-rata Pengeluaran</h3><div class="spend-list" id="spend-list"></div></div>
  </div>
</div>

<div class="ship-grid">
  <div class="geo-panel"><h3>Metode Pengiriman</h3><div class="ship-method" id="ship-method"></div></div>
  <div class="geo-panel"><h3>Musim × Metode Pengiriman (transaksi)</h3><div class="heatmap-wrap"><table class="heatmap-table" id="heatmap"></table></div></div>
</div>
</div>
</div>

<script>
(function() {
  "use strict";
  
  let sizeChart = null;
  
  const STATE_PATHS = {
    "Alabama": "M 580 370 L 600 370 L 605 440 L 575 440 Z", "Alaska": "M 110 480 L 200 480 L 200 550 L 110 550 Z",
    "Arizona": "M 195 320 L 270 320 L 270 400 L 195 400 Z", "Arkansas": "M 535 355 L 590 355 L 590 400 L 535 400 Z",
    "California": "M 100 250 L 170 230 L 185 400 L 100 400 Z", "Colorado": "M 270 285 L 365 285 L 365 340 L 270 340 Z",
    "Connecticut": "M 760 205 L 785 205 L 785 225 L 760 225 Z", "Delaware": "M 745 240 L 760 240 L 760 265 L 745 265 Z",
    "Florida": "M 600 435 L 650 435 L 670 490 L 620 510 L 590 470 Z", "Georgia": "M 600 370 L 645 370 L 650 435 L 600 435 Z",
    "Hawaii": "M 280 540 L 360 540 L 360 570 L 280 570 Z", "Idaho": "M 195 175 L 255 165 L 265 260 L 200 265 Z",
    "Illinois": "M 555 260 L 590 260 L 590 345 L 555 345 Z", "Indiana": "M 590 260 L 625 260 L 625 340 L 590 340 Z",
    "Iowa": "M 490 240 L 555 240 L 555 290 L 490 290 Z", "Kansas": "M 385 310 L 495 310 L 495 355 L 385 355 Z",
    "Kentucky": "M 590 315 L 660 305 L 670 350 L 590 355 Z", "Louisiana": "M 510 415 L 580 415 L 575 460 L 510 455 Z",
    "Maine": "M 800 130 L 840 115 L 850 185 L 800 185 Z", "Maryland": "M 705 265 L 760 255 L 765 280 L 705 285 Z",
    "Massachusetts": "M 770 195 L 820 190 L 825 215 L 770 215 Z", "Michigan": "M 580 195 L 630 185 L 645 250 L 590 255 Z",
    "Minnesota": "M 465 155 L 535 150 L 540 235 L 465 235 Z", "Mississippi": "M 545 370 L 575 370 L 575 445 L 545 445 Z",
    "Missouri": "M 490 295 L 555 295 L 555 360 L 490 360 Z", "Montana": "M 250 145 L 410 140 L 415 220 L 250 225 Z",
    "Nebraska": "M 380 265 L 490 265 L 490 310 L 380 310 Z", "Nevada": "M 155 245 L 225 230 L 240 335 L 160 345 Z",
    "New Hampshire": "M 770 165 L 790 160 L 795 200 L 770 200 Z", "New Jersey": "M 740 235 L 760 235 L 765 270 L 740 265 Z",
    "New Mexico": "M 255 355 L 350 355 L 350 430 L 255 430 Z", "New York": "M 680 180 L 760 165 L 765 230 L 680 240 Z",
    "North Carolina": "M 645 320 L 760 305 L 765 345 L 645 355 Z", "North Dakota": "M 380 155 L 465 150 L 465 210 L 380 210 Z",
    "Ohio": "M 620 255 L 670 250 L 675 320 L 620 325 Z", "Oklahoma": "M 355 360 L 495 360 L 495 405 L 355 405 Z",
    "Oregon": "M 115 195 L 215 185 L 220 265 L 115 270 Z", "Pennsylvania": "M 665 225 L 745 215 L 748 260 L 665 265 Z",
    "Rhode Island": "M 785 210 L 800 210 L 800 228 L 785 228 Z", "South Carolina": "M 645 355 L 695 345 L 700 395 L 645 395 Z",
    "South Dakota": "M 380 210 L 465 210 L 465 265 L 380 265 Z", "Tennessee": "M 545 345 L 650 335 L 655 375 L 545 380 Z",
    "Texas": "M 310 375 L 510 375 L 510 480 L 390 500 L 310 450 Z", "Utah": "M 220 280 L 275 280 L 280 360 L 220 360 Z",
    "Vermont": "M 755 155 L 775 150 L 778 195 L 755 195 Z", "Virginia": "M 665 290 L 755 275 L 760 320 L 665 330 Z",
    "Washington": "M 130 135 L 220 130 L 225 195 L 130 195 Z", "West Virginia": "M 655 265 L 700 260 L 705 305 L 655 310 Z",
    "Wisconsin": "M 525 195 L 575 190 L 578 258 L 525 258 Z", "Wyoming": "M 270 220 L 370 215 L 372 285 L 270 285 Z"
  };
  
  function showLoading(show) {
    const loadingDiv = document.getElementById('loading-state');
    const contentDiv = document.getElementById('dashboard-content');
    if (loadingDiv && contentDiv) {
      if (show) {
        loadingDiv.style.display = 'block';
        contentDiv.style.display = 'none';
      } else {
        loadingDiv.style.display = 'none';
        contentDiv.style.display = 'block';
      }
    }
  }
  
  function showError(message) {
    const loadingDiv = document.getElementById('loading-state');
    if (loadingDiv) {
      loadingDiv.innerHTML = `
        <div class="error-message">
          <i class="ti ti-database-off"></i>
          <strong>⚠️ ${message}</strong><br><br>
          <span style="font-size:12px;color:#8a9bb0">
          Silakan buka halaman <strong>Manajemen Data</strong> terlebih dahulu<br>
          untuk mengisi data pelanggan.
          </span>
        </div>
      `;
      loadingDiv.style.display = 'block';
    }
  }
  
  function loadDataAndRender() {
    showLoading(true);
    
    try {
      const rawData = localStorage.getItem('shopInsightRealData');
      
      if (!rawData || rawData === 'undefined' || rawData === 'null') {
        showError('Data tidak ditemukan. Silakan buka Manajemen Data terlebih dahulu.');
        return;
      }
      
      let data;
      try {
        data = JSON.parse(rawData);
      } catch(e) {
        showError('Format data tidak valid');
        return;
      }
      
      if (!data || !Array.isArray(data) || data.length === 0) {
        showError('Data kosong');
        return;
      }
      
      console.log(`✅ Load ${data.length} data dari localStorage`);
      
      // Proses data
      const stateStats = new Map();
      const shipStats = new Map();
      const seasonShipStats = new Map();
      let totalTxn = 0;
      let totalRevenue = 0;
      
      for (const row of data) {
        const location = row["Location"];
        const amount = parseFloat(row["Purchase Amount (USD)"]) || 0;
        const rating = parseFloat(row["Review Rating"]) || 0;
        const shipping = row["Shipping Type"];
        const season = row["Season"];
        
        if (!location) continue;
        
        totalTxn++;
        totalRevenue += amount;
        
        if (!stateStats.has(location)) {
          stateStats.set(location, { n: 0, totalSpend: 0, totalRating: 0 });
        }
        const st = stateStats.get(location);
        st.n++;
        st.totalSpend += amount;
        st.totalRating += rating;
        
        if (shipping && shipping !== '') {
          shipStats.set(shipping, (shipStats.get(shipping) || 0) + 1);
        }
        
        if (season && season !== '' && shipping && shipping !== '') {
          const key = `${season}|${shipping}`;
          seasonShipStats.set(key, (seasonShipStats.get(key) || 0) + 1);
        }
      }
      
      if (stateStats.size === 0) {
        showError('Tidak ada data lokasi yang valid');
        return;
      }
      
      // Konversi ke object
      const STATE_STATS = {};
      for (let [state, stats] of stateStats) {
        STATE_STATS[state] = {
          n: stats.n,
          spend: +(stats.totalSpend / stats.n).toFixed(2),
          rating: +(stats.totalRating / stats.n).toFixed(2)
        };
      }
      
      const totalShip = Array.from(shipStats.values()).reduce((a,b) => a+b, 0);
      const SHIP_STATS = {};
      const shipColors = {
        "Free Shipping": "#3b9eff",
        "Store Pickup": "#00d4a0",
        "Express": "#a78bfa",
        "Standard": "#f59e0b",
        "2-Day Shipping": "#f97316",
        "Next Day Air": "#ec4899"
      };
      for (let [method, count] of shipStats) {
        SHIP_STATS[method] = {
          n: count,
          pct: totalShip > 0 ? +((count / totalShip) * 100).toFixed(1) : 0,
          color: shipColors[method] || "#8a9bb0"
        };
      }
      
      const seasons = ["Spring", "Summer", "Fall", "Winter"];
      const methods = Object.keys(SHIP_STATS);
      const SEASON_SHIP_DATA = {};
      for (let m of methods) {
        SEASON_SHIP_DATA[m] = [];
        for (let s of seasons) {
          SEASON_SHIP_DATA[m].push(seasonShipStats.get(`${s}|${m}`) || 0);
        }
      }
      
      renderDashboard({
        STATE_STATS, SHIP_STATS, SEASON_SHIP_DATA, seasons, methods,
        totalTxn, totalRevenue
      });
      
      showLoading(false);
      
    } catch (error) {
      console.error('Error:', error);
      showError('Gagal memuat data: ' + error.message);
    }
  }
  
  function renderDashboard(data) {
    const { STATE_STATS, SHIP_STATS, SEASON_SHIP_DATA, seasons, methods, totalTxn, totalRevenue } = data;
    
    const avgSpendAll = totalTxn > 0 ? (totalRevenue / totalTxn).toFixed(2) : 0;
    const sorted = Object.entries(STATE_STATS).sort((a, b) => b[1].n - a[1].n);
    const topState = sorted[0] || ['-', { n: 0 }];
    const topShip = Object.entries(SHIP_STATS).sort((a, b) => b[1].n - a[1].n)[0] || ['-', { pct: 0 }];
    const maxN = sorted[0]?.[1]?.n || 1;
    const fmtRevenue = totalRevenue >= 1000000 ? `$${(totalRevenue / 1000000).toFixed(1)}M` : `$${(totalRevenue / 1000).toFixed(0)}K`;
    
    const cardsDiv = document.getElementById('geo-cards');
    if (cardsDiv) {
      cardsDiv.innerHTML = `
        <div class="geo-card accent"><div class="label">Total Pendapatan</div><div class="val" style="font-size:18px">${fmtRevenue}</div><div class="sub">dari ${totalTxn.toLocaleString()} transaksi</div></div>
        <div class="geo-card"><div class="label">Rata-rata</div><div class="val">$${avgSpendAll}</div><div class="sub">per transaksi</div></div>
        <div class="geo-card green"><div class="label">Negara Bagian Teratas</div><div class="val">${topState[0]}</div><div class="sub">${topState[1].n} transaksi</div></div>
        <div class="geo-card"><div class="label">Metode Pengiriman Teratas</div><div class="val" style="font-size:15px;line-height:1.4">${topShip[0]}</div><div class="sub">${topShip[1].pct}% dari total</div></div>
      `;
    }
    
    const stateListDiv = document.getElementById('state-list');
    if (stateListDiv) {
      stateListDiv.innerHTML = sorted.slice(0,5).map(([st, d], i) => `
        <div class="state-item">
          <span class="state-rank">${i+1}</span>
          <span class="state-name">${st}</span>
          <div class="state-bar-wrap"><div class="state-bar-bg"><div class="state-bar-fill" style="width: ${(d.n / maxN * 100).toFixed(1)}%"></div></div></div>
          <span class="state-count">${d.n}</span>
        </div>
      `).join('');
    }
    
    const topSpend5 = Object.entries(STATE_STATS).sort((a, b) => b[1].spend - a[1].spend).slice(0,5);
    const maxSpend = topSpend5[0]?.[1]?.spend || 1;
    const spendListDiv = document.getElementById('spend-list');
    if (spendListDiv) {
      spendListDiv.innerHTML = topSpend5.map(([st, d], i) => `
        <div class="spend-item">
          <span class="spend-rank">${i+1}</span>
          <span class="spend-name">${st}</span>
          <div class="spend-bar-wrap"><div class="spend-bar-bg"><div class="spend-bar-fill" style="width: ${(d.spend / maxSpend * 100).toFixed(1)}%"></div></div></div>
          <span class="spend-val">$${d.spend.toFixed(1)}</span>
        </div>
      `).join('');
    }
    
    const maxPct = Math.max(...Object.values(SHIP_STATS).map(d => d.pct), 1);
    const shipMethodDiv = document.getElementById('ship-method');
    if (shipMethodDiv) {
      shipMethodDiv.innerHTML = Object.entries(SHIP_STATS).map(([name, d]) => `
        <div class="ship-row">
          <div class="ship-dot" style="background: ${d.color}"></div>
          <span class="ship-name">${name}</span>
          <div class="ship-bar-bg"><div class="ship-bar-fill" style="width: ${(d.pct / maxPct * 100).toFixed(1)}%; background: ${d.color}"></div></div>
          <span class="ship-pct">${d.pct}%</span>
        </div>
      `).join('');
    }
    
    const allVals = methods.flatMap(m => SEASON_SHIP_DATA[m] || []);
    const hmMin = Math.min(...allVals, 0);
    const hmMax = Math.max(...allVals, 1);
    const hmColor = (v) => { const t = hmMax === hmMin ? 0 : (v - hmMin) / (hmMax - hmMin); return `rgba(59, 158, 255, ${0.12 + t * 0.75})`; };
    const hmText = (v) => { const t = hmMax === hmMin ? 0 : (v - hmMin) / (hmMax - hmMin); return t > 0.5 ? '#fff' : '#8a9bb0'; };
    
    let heatHTML = '<thead><tr><th class="row-head">Metode</th>';
    seasons.forEach(s => heatHTML += `<th>${s}</th>`);
    heatHTML += '</tr></thead><tbody>';
    methods.forEach(m => {
      heatHTML += `<tr><td style="text-align:left;padding:6px 10px;font-size:12px;color:#8a9bb0">${m}</td>`;
      (SEASON_SHIP_DATA[m] || []).forEach(v => heatHTML += `<td style="background: ${hmColor(v)}; color: ${hmText(v)}">${v}</td>`);
      heatHTML += '</tr>';
    });
    heatHTML += '</tbody>';
    const heatmapDiv = document.getElementById('heatmap');
    if (heatmapDiv) heatmapDiv.innerHTML = heatHTML;
    
    const stateColor = (n) => {
      if (!n || n === 0) return '#152030';
      const t = Math.min(n / maxN, 1);
      return `rgb(${Math.round(15 + t * 44)}, ${Math.round(32 + t * 126)}, ${Math.round(48 + t * 207)})`;
    };
    
    const svg = document.getElementById('us-map');
    const tooltip = document.getElementById('map-tooltip');
    const wrap = document.getElementById('us-map-wrap');
    if (svg) {
      svg.innerHTML = '';
      
      Object.entries(STATE_PATHS).forEach(([state, path]) => {
        const d = STATE_STATS[state];
        const n = d ? d.n : 0;
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        el.setAttribute('d', path);
        el.setAttribute('fill', stateColor(n));
        el.setAttribute('stroke', '#0f1923');
        el.setAttribute('stroke-width', '1.5');
        el.setAttribute('class', 'state-path');
        
        if (wrap && tooltip) {
          el.addEventListener('mousemove', (e) => {
            const rect = wrap.getBoundingClientRect();
            const x = e.clientX - rect.left + 12;
            const y = e.clientY - rect.top - 10;
            tooltip.style.left = Math.min(x, rect.width - 180) + 'px';
            tooltip.style.top = Math.max(y - 60, 5) + 'px';
            tooltip.style.display = 'block';
            const ttState = document.getElementById('tt-state');
            const ttTxn = document.getElementById('tt-txn');
            const ttAvg = document.getElementById('tt-avg');
            const ttRat = document.getElementById('tt-rat');
            if (ttState) ttState.textContent = state;
            if (ttTxn) ttTxn.textContent = n || '–';
            if (ttAvg) ttAvg.textContent = d ? `$${d.spend.toFixed(1)}` : '–';
            if (ttRat) ttRat.textContent = d ? `★ ${d.rating.toFixed(2)}` : '–';
          });
          el.addEventListener('mouseleave', () => tooltip.style.display = 'none');
        }
        svg.appendChild(el);
        
        if (n > 0) {
          const nums = path.match(/[\d.]+/g).map(Number);
          const xs = nums.filter((_, i) => i % 2 === 0);
          const ys = nums.filter((_, i) => i % 2 === 1);
          const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
          const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', cx);
          t.setAttribute('y', cy + 4);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('font-size', '8');
          t.setAttribute('fill', n > maxN * 0.5 ? '#fff' : 'rgba(255,255,255,0.7)');
          t.setAttribute('pointer-events', 'none');
          t.textContent = n;
          svg.appendChild(t);
        }
      });
    }
  }
  
  window.addEventListener('storage', function(e) {
    if (e.key === 'shopInsightRealData' || e.key === 'forceDashboardRefresh') {
      loadDataAndRender();
    }
  });
  
  loadDataAndRender();
  
})();
</script>

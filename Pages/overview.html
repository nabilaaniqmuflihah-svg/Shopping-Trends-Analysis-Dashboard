<style>
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.metric-icon{font-size:18px;margin-bottom:8px}
.metric-val{font-size:22px;font-weight:500;color:var(--text)}
.metric-label{font-size:11px;color:var(--text2);margin-top:2px}
.metric-sub{font-size:10px;color:var(--text3);margin-top:3px}
.metric.accent-blue .metric-icon{color:var(--accent)}
.metric.accent-green .metric-icon{color:var(--accent2)}
.metric.accent-orange .metric-icon{color:var(--accent3)}
.metric.accent-purple .metric-icon{color:#a78bfa}
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bar-list{display:flex;flex-direction:column;gap:7px}
.bar-item{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-label{width:100px;color:var(--text2);text-align:right;flex-shrink:0}
.bar-track{flex:1;background:rgba(255,255,255,0.06);border-radius:3px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{width:60px;color:var(--text2);font-size:10px;text-align:right}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;visibility:hidden}
.loading-overlay.active{visibility:visible}
.loading-spinner{width:40px;height:40px;border:3px solid #1e2d3d;border-top-color:#3b9eff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-message{text-align:center;padding:40px;background:#1e2d3d;border-radius:12px;color:#f87171;margin:20px}
.error-message i{font-size:32px;margin-bottom:12px;display:block}
</style>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div id="dashboard-content">
<div class="metrics">
  <div class="metric accent-blue">
    <div class="metric-icon"><i class="ti ti-currency-dollar"></i></div>
    <div class="metric-val" id="totalRevenue">$0</div>
    <div class="metric-label">Total Pendapatan</div>
    <div class="metric-sub" id="totalTxn">dari 0 transaksi</div>
  </div>
  <div class="metric accent-green">
    <div class="metric-icon"><i class="ti ti-shopping-cart"></i></div>
    <div class="metric-val" id="avgPerTransaction">$0</div>
    <div class="metric-label">Rata-rata/Transaksi</div>
    <div class="metric-sub">USD per transaksi</div>
  </div>
  <div class="metric accent-orange">
    <div class="metric-icon"><i class="ti ti-star"></i></div>
    <div class="metric-val" id="avgRating">0</div>
    <div class="metric-label">Rata-rata Rating</div>
    <div class="metric-sub">skala 1–5</div>
  </div>
  <div class="metric accent-purple">
    <div class="metric-icon"><i class="ti ti-calendar"></i></div>
    <div class="metric-val">4</div>
    <div class="metric-label">Musim Aktif</div>
    <div class="metric-sub">Spring, Summer, Fall, Winter</div>
  </div>
</div>

<div class="chart-grid-2">
  <div class="chart-card">
    <div class="chart-title">Total Pendapatan per Kategori (USD)</div>
    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:#3b9eff"></span>Clothing</span>
      <span class="legend-item"><span class="legend-dot" style="background:#00d4a0"></span>Accessories</span>
      <span class="legend-item"><span class="legend-dot" style="background:#ff6b4a"></span>Footwear</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Outerwear</span>
    </div>
    <div style="position:relative;height:190px"><canvas id="c_catrev"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Penjualan per Musim (transaksi)</div>
    <div style="position:relative;height:218px"><canvas id="c_season"></canvas></div>
  </div>
</div>

<div class="chart-card full">
  <div class="chart-title">Metode Pembayaran (jumlah pengguna)</div>
  <div class="bar-list" id="paymentList"></div>
</div>
</div>

<script>
(function() {
  "use strict";
  
  let catRevChart = null;
  let seasonChart = null;
  
  function showLoading(show) {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) {
      if (show) overlay.classList.add('active');
      else overlay.classList.remove('active');
    }
  }
  
  function showError(message) {
    const container = document.getElementById('dashboard-content');
    if (container) {
      container.innerHTML = `
        <div class="error-message">
          <i class="ti ti-database-off"></i>
          <strong>⚠️ ${message}</strong><br><br>
          <span style="font-size:12px;color:#8a9bb0">
          Silakan buka halaman <strong>Manajemen Data</strong> terlebih dahulu<br>
          untuk mengisi data pelanggan.
          </span>
        </div>
      `;
    }
  }
  
  function loadDataAndRender() {
    showLoading(true);
    
    try {
      const rawData = localStorage.getItem('shopInsightRealData');
      
      if (!rawData || rawData === 'undefined' || rawData === 'null') {
        showError('Data tidak ditemukan. Silakan buka Manajemen Data terlebih dahulu.');
        showLoading(false);
        return;
      }
      
      let data;
      try {
        data = JSON.parse(rawData);
      } catch(e) {
        showError('Format data tidak valid');
        showLoading(false);
        return;
      }
      
      if (!data || !Array.isArray(data) || data.length === 0) {
        showError('Data kosong');
        showLoading(false);
        return;
      }
      
      console.log(`✅ Overview: Load ${data.length} data dari localStorage`);
      
      // Hitung statistik
      let totalRevenue = 0;
      let totalRating = 0;
      let ratingCount = 0;
      const categoryRevenue = {
        'Clothing': 0,
        'Accessories': 0,
        'Footwear': 0,
        'Outerwear': 0
      };
      const seasonCount = {
        'Spring': 0,
        'Summer': 0,
        'Fall': 0,
        'Winter': 0
      };
      const paymentCount = {};
      
      for (const row of data) {
        const amount = parseFloat(row["Purchase Amount (USD)"]) || 0;
        const rating = parseFloat(row["Review Rating"]) || 0;
        const category = row["Category"];
        const season = row["Season"];
        const payment = row["Payment Method"];
        
        totalRevenue += amount;
        
        if (rating > 0) {
          totalRating += rating;
          ratingCount++;
        }
        
        if (category && categoryRevenue.hasOwnProperty(category)) {
          categoryRevenue[category] += amount;
        }
        
        if (season && seasonCount.hasOwnProperty(season)) {
          seasonCount[season]++;
        }
        
        if (payment) {
          paymentCount[payment] = (paymentCount[payment] || 0) + 1;
        }
      }
      
      const totalTxn = data.length;
      const avgPerTransaction = totalTxn > 0 ? totalRevenue / totalTxn : 0;
      const avgRating = ratingCount > 0 ? (totalRating / ratingCount).toFixed(2) : 0;
      
      // Format revenue
      const fmtRevenue = totalRevenue >= 1000000 ? `$${(totalRevenue / 1000000).toFixed(1)}M` : `$${(totalRevenue / 1000).toFixed(0)}K`;
      
      // Update metrics
      document.getElementById('totalRevenue').innerText = fmtRevenue;
      document.getElementById('totalTxn').innerHTML = `dari ${totalTxn.toLocaleString()} transaksi`;
      document.getElementById('avgPerTransaction').innerText = `$${avgPerTransaction.toFixed(2)}`;
      document.getElementById('avgRating').innerText = avgRating;
      
      // Update payment methods bar chart
      const sortedPayments = Object.entries(paymentCount).sort((a,b) => b[1] - a[1]);
      const maxPayment = sortedPayments[0]?.[1] || 1;
      const paymentContainer = document.getElementById('paymentList');
      if (paymentContainer) {
        paymentContainer.innerHTML = sortedPayments.map(([method, count]) => {
          const percent = (count / maxPayment) * 100;
          const barColor = percent > 95 ? 'var(--accent)' : (percent > 85 ? '#a78bfa' : 'var(--text3)');
          return `
            <div class="bar-item">
              <span class="bar-label">${method}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${percent}%;background:${barColor}"></div></div>
              <span class="bar-val">${count.toLocaleString()} pengguna</span>
            </div>
          `;
        }).join('');
      }
      
      // Update charts
      const tc = '#8a9bb0', gc = 'rgba(255,255,255,0.06)';
      const co = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
      
      // Category Revenue Chart
      const catData = [
        categoryRevenue['Clothing'],
        categoryRevenue['Accessories'],
        categoryRevenue['Footwear'],
        categoryRevenue['Outerwear']
      ];
      
      if (catRevChart) catRevChart.destroy();
      catRevChart = new Chart(document.getElementById('c_catrev'), {
        type: 'bar',
        data: {
          labels: ['Clothing', 'Accessories', 'Footwear', 'Outerwear'],
          datasets: [{
            data: catData,
            backgroundColor: ['#3b9eff', '#00d4a0', '#ff6b4a', '#a78bfa'],
            borderRadius: 5,
            barPercentage: 0.7
          }]
        },
        options: {
          ...co,
          scales: {
            x: { ticks: { color: tc, font: { size: 11 } }, grid: { display: false } },
            y: {
              ticks: { color: tc, font: { size: 10 }, callback: v => '$' + (v / 1000).toFixed(0) + 'K' },
              grid: { color: gc }
            }
          },
          plugins: {
            tooltip: { callbacks: { label: (ctx) => ' $' + ctx.raw.toLocaleString() } },
            legend: { display: false }
          }
        }
      });
      
      // Season Chart
      const seasonData = [
        seasonCount['Spring'],
        seasonCount['Summer'],
        seasonCount['Fall'],
        seasonCount['Winter']
      ];
      const totalSeason = seasonData.reduce((a,b) => a+b, 0);
      
      if (seasonChart) seasonChart.destroy();
      seasonChart = new Chart(document.getElementById('c_season'), {
        type: 'doughnut',
        data: {
          labels: ['Spring', 'Summer', 'Fall', 'Winter'],
          datasets: [{
            data: seasonData,
            backgroundColor: ['#00d4a0', '#ff6b4a', '#a78bfa', '#3b9eff'],
            borderWidth: 0
          }]
        },
        options: {
          ...co,
          cutout: '60%',
          plugins: {
            legend: { display: true, position: 'bottom', labels: { color: tc, font: { size: 11 }, boxWidth: 10 } },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const val = ctx.raw;
                  const percent = ((val / totalSeason) * 100).toFixed(1);
                  return ` ${val.toLocaleString()} transaksi (${percent}%)`;
                }
              }
            }
          }
        }
      });
      
      showLoading(false);
      
    } catch (error) {
      console.error('Error:', error);
      showError('Gagal memuat data: ' + error.message);
      showLoading(false);
    }
  }
  
  // Auto-sync dengan storage event
  window.addEventListener('storage', function(e) {
    if (e.key === 'shopInsightRealData' || e.key === 'forceDashboardRefresh') {
      console.log('🔄 Overview: Data changed, reloading...');
      loadDataAndRender();
    }
  });
  
  // Initial load
  loadDataAndRender();
  
  // Periodic check setiap 3 detik
  let lastDataLength = localStorage.getItem('shopInsightRealData')?.length || 0;
  setInterval(() => {
    const currentLength = localStorage.getItem('shopInsightRealData')?.length || 0;
    if (currentLength !== lastDataLength) {
      lastDataLength = currentLength;
      console.log('🔄 Overview: Auto-detected data change, reloading...');
      loadDataAndRender();
    }
  }, 3000);
  
})();
</script>
